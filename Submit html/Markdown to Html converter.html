<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scribble - Markdown to HTML Converter</title>
  <link rel="stylesheet" href="converter.css" />
</head>
<body>
  <main class="wrapper">
    <header>
      <p class="eyebrow">Scribble</p>
      <h1>Write markdown, watch it become HTML</h1>
    </header>

    <div class="panels">
      <section class="panel">
        <h2 class="panel-title">Markdown</h2>
        <textarea
          id="markdown-input"
          placeholder="# Try a heading&#10;**bold**, *italic*, > a quote&#10;[a link](https://example.com)"
        ></textarea>
      </section>

      <section class="panel">
        <h2 class="panel-title">Preview</h2>
        <div id="preview"></div>
      </section>

      <section class="panel">
        <h2 class="panel-title">Raw HTML</h2>
        <pre id="html-output"></pre>
      </section>
    </div>
  </main>

  <script src="converter.js"></script>
</body>
</html>
